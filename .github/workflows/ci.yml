name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    # Windows-only: the tests target net10.0-windows and hardware control uses
    # NVAPI/NVML (Windows). The build guards the platform at runtime.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # Validate NativeAOT publish on every push/PR so release-only AOT/trimming/interop regressions surface before tags.
  # This compiles the service like Release does, with MSVC linker, but uploads no artifacts.
  aot-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # NativeAOT links with the MSVC toolchain; put link.exe on PATH.
      - name: Setup MSVC (NativeAOT linker)
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Publish background service (NativeAOT, win-x64)
        run: dotnet publish src/AorusLcd.Service -c Release -r win-x64
