name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release and upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      # NativeAOT links with the MSVC toolchain; put link.exe on PATH.
      - name: Setup MSVC (NativeAOT linker)
        uses: ilammy/msvc-dev-cmd@v1.13.0

      # Strip the leading 'v' from the tag so it stamps a clean assembly/installer version.
      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Signing is optional: it runs only when the SIGN_CERT_BASE64 secret is set,
      # so forks and unconfigured repos still produce a working (unsigned) release.
      - name: Detect signing secret
        id: signing
        shell: pwsh
        env:
          SIGN_CERT_BASE64: ${{ secrets.SIGN_CERT_BASE64 }}
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:SIGN_CERT_BASE64)
          "enabled=$($enabled.ToString().ToLower())" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8
          if (-not $enabled) { Write-Host "::notice::SIGN_CERT_BASE64 not set - release binaries will be unsigned." }

      - name: Import signing certificate
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGN_CERT_BASE64: ${{ secrets.SIGN_CERT_BASE64 }}
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGN_CERT_BASE64))
          "CODESIGN_PFX=$pfx" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          $st = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match '\\x64\\' } | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $st) { throw "signtool.exe not found in the Windows 10 SDK." }
          "SIGNTOOL=$($st.FullName)" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Publish background service (NativeAOT, win-x64)
        run: dotnet publish src/AorusLcd.Service -c Release -r win-x64 -p:Version=${{ steps.ver.outputs.version }} -o publish/service

      - name: Publish GUI (self-contained single file, win-x64)
        run: >
          dotnet publish src/AorusLcd.Gui -c Release -r win-x64 --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none -p:Version=${{ steps.ver.outputs.version }} -o publish/self-contained

      - name: Publish GUI (framework-dependent single file, win-x64)
        run: >
          dotnet publish src/AorusLcd.Gui -c Release -r win-x64 --no-self-contained
          -p:PublishSingleFile=true -p:DebugType=none
          -p:Version=${{ steps.ver.outputs.version }} -o publish/framework-dependent

      # Bundle the service exe next to the GUI (deterministic - independent of the
      # csproj auto-copy) and drop native-package PDBs (incl. runtimes/ subdirs).
      - name: Bundle service + trim symbols
        shell: pwsh
        run: |
          foreach ($dir in "publish/self-contained", "publish/framework-dependent") {
            Copy-Item "publish/service/AorusLcd.Service.exe" "$dir/AorusLcd.Service.exe" -Force
            Get-ChildItem $dir -Recurse -Filter *.pdb | Remove-Item -Force
          }

      # Sign the app binaries before packaging so both the installer and the zips
      # ship signed exes. Timestamped so signatures stay valid after the cert expires.
      - name: Sign application binaries
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          $targets = @(
            "publish/self-contained/AorusLcd.Gui.exe",
            "publish/self-contained/AorusLcd.Service.exe",
            "publish/framework-dependent/AorusLcd.Gui.exe",
            "publish/framework-dependent/AorusLcd.Service.exe"
          )
          & "$env:SIGNTOOL" sign /f "$env:CODESIGN_PFX" /p "$env:SIGN_CERT_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 @targets
          if ($LASTEXITCODE -ne 0) { throw "signtool failed on application binaries." }

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer/AorusLcd.iss

      - name: Sign installer
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          SIGN_CERT_PASSWORD: ${{ secrets.SIGN_CERT_PASSWORD }}
        run: |
          $setup = Get-ChildItem installer/output -Filter *-setup.exe | Select-Object -First 1
          if (-not $setup) { throw "setup.exe not found in installer/output." }
          & "$env:SIGNTOOL" sign /f "$env:CODESIGN_PFX" /p "$env:SIGN_CERT_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $setup.FullName
          if ($LASTEXITCODE -ne 0) { throw "signtool failed on the installer." }

      - name: Package zip artifacts
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          Compress-Archive -Path "publish/self-contained/*" `
            -DestinationPath "AorusLcd-$v-win-x64-self-contained.zip"
          Compress-Archive -Path "publish/framework-dependent/*" `
            -DestinationPath "AorusLcd-$v-win-x64-framework-dependent.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            installer/output/AorusLcd-*-setup.exe
            AorusLcd-*-win-x64-self-contained.zip
            AorusLcd-*-win-x64-framework-dependent.zip
          generate_release_notes: true
          # Tags with a pre-release suffix (e.g. v1.0.0-alpha) are marked pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Clean up signing certificate
        if: always() && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $env:RUNNER_TEMP 'codesign.pfx')
